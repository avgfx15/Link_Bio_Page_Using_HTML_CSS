<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <title>Link Bio Page Using HTML and CSS</title>
  </head>
  <body>
    <div class="mainContainer">
      <div class="bioCard">
        <div class="profileImage">
          <img
            src="https://images.unsplash.com/photo-1508214751196-bcfd4ca60f91?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8cHJvZmlsZSUyMGltYWdlfGVufDB8fDB8fHww&w=1000&q=80"
            alt="Profile Image"
          />
        </div>
        <div class="profileInfo">
          <h1 class="name">Stacodev</h1>
          <p class="skills">
            Web Developer | Full Stack Developer | App Developer
          </p>
          <p class="tagLine">Stack Code Developer</p>
        </div>
        <div class="socialLinks">
          <a href="https://www.youtube.com/@avgfx5312/videos" target="_blank"
            ><i class="fa-brands fa-youtube"></i> Youtube</a
          >
          <a href="#"
            ><i class="fa-brands fa-square-instagram"></i> Instagram</a
          >
          <a href="#"><i class="fa-brands fa-twitter"></i> Twitter</a>
          <a href="#"><i class="fa-brands fa-linkedin"></i> LinkedIn</a>
          <a href="https://github.com/avgfx15" target="_blank"
            ><i class="fa-brands fa-github"></i> GitHub</a
          >
          <a href="#"><i class="fa-regular fa-envelope"></i> Email Me</a>
        </div>
        <div class="footer">
          <p>Copyright &copy; 2022 Stacodev. All rights reserved.</p>
        </div>
      </div>
    </div>
  </body>
</html>
